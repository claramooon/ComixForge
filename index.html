<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    window.onerror = function(m,s,l,c,e){ document.body.innerHTML = '<div style="color:red;padding:20px;font-size:12px;font-family:monospace">'+m+'<br/>Line:'+l+'<br/>'+(e?e.stack:'')+'</div>'; return true; };

    ReactDOM.createRoot(document.getElementById('root')).render(<h1 style={{color:'red'}}>HELLO!</h1>);
    
  </script>
</body>
</html>
