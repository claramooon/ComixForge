name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        
      - name: Fix smart punctuation
        run: |
          python3 -c "
          import os
          lq = chr(0x201c)
          rq = chr(0x201d)
          ls = chr(0x2018)
          rs = chr(0x2019)
          el = chr(0x2026)
          nd = chr(0x2013)
          md = chr(0x2014)
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.jsx'):
                      path = os.path.join(root, f)
                      t = open(path, encoding='utf-8', errors='replace').read()
                      t = t.replace(lq,'\"').replace(rq,'\"')
                      t = t.replace(ls,\"'\").replace(rs,\"'\")
                      t = t.replace(el,'...').replace(nd,'-').replace(md,'--')
                      open(path,'w', encoding='utf-8').write(t)
                      print('Fixed:', path)
          "


      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
